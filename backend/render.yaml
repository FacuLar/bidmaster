# Despliegue del backend BidMaster en Render.com (entrega final).
# Crea el servicio web + (opcional) una base Postgres administrada.
services:
  - type: web
    name: bidmaster-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STREAM_BASE_URL
        value: wss://stream.bidmaster.com
      # Para usar Postgres en producción, descomentar y vincular la base:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: bidmaster-db
      #     property: connectionString

